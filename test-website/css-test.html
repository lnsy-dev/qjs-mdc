<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <!-- Shapes with links -->
  <a href="#circle">
    <circle cx="100" cy="80" r="40" fill="#4CAF50" stroke="#000" stroke-width="2" cursor="pointer" />
  </a>
  <a href="#rect">
    <rect x="180" y="40" width="80" height="80" fill="#2196F3" stroke="#000" stroke-width="2" cursor="pointer" />
  </a>
  <a href="#triangle">
    <polygon points="320,40 360,120 280,120" fill="#FF9800" stroke="#000" stroke-width="2" cursor="pointer" />
  </a>
  
  <!-- Caption area -->
  <rect x="0" y="180" width="400" height="120" fill="#f5f5f5" stroke="#000" stroke-width="1" />
  
  <!-- Labels (hidden by default, shown when targeted) -->
  <g id="circle" opacity="0">
    <text x="200" y="220" text-anchor="middle" font-size="16" font-weight="bold">Circle</text>
    <text x="200" y="245" text-anchor="middle" font-size="12">Green circle, radius: 40px</text>
  </g>
  
  <g id="rect" opacity="0">
    <text x="200" y="220" text-anchor="middle" font-size="16" font-weight="bold">Rectangle</text>
    <text x="200" y="245" text-anchor="middle" font-size="12">Blue rectangle, 80x80px</text>
  </g>
  
  <g id="triangle" opacity="0">
    <text x="200" y="220" text-anchor="middle" font-size="16" font-weight="bold">Triangle</text>
    <text x="200" y="245" text-anchor="middle" font-size="12">Orange triangle, equilateral</text>
  </g>
  
  <style>
    :target { opacity: 1 !important; }
  </style>
</svg>
