<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tags — QJS-MD Test Notebook</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Poly:ital@0;1&display=swap');


:root {
  --bg-color: #FDF8E7;
  --fg-color: #2d3a2d;
  --neutral-background-color:#f0eee4;
  --highlight-color: #8C001A;
  --neutral-color: #FEF6F3;
  --color-border: var(--neutral-color);
  --font-family: "Poly", serif;

  /* SVG pattern fills */
  --pattern-fill: var(--bg-color);
  --pattern-stroke: var(--fg-color);

  /* SVG data elements (bars, circles, paths, slices) */
  --data-element-stroke: var(--fg-color);
  --data-element-stroke-width: 1;

  /* SVG axes */
  --axis-stroke: #999;
  --axis-stroke-width: 1;

  /* SVG labels */
  --label-fill: var(--fg-color);
  --label-font-size: 10px;
  --label-font-family:  "Poly", serif;
;
}

*,
*::before,
*::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: var(--font-family);
  line-height: 1.6;
  color: var(--fg-color);
  background: var(--bg-color);
  max-width: 860px;
  margin: 0 auto;
  padding: 0 1.5rem;
}

a {
  color: var(--highlight-color);
}

header {
  border-bottom: 1px solid #ddd;
  padding: 1rem 0;
  margin-bottom: 2rem;
}

header nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 0.5rem;
}

.site-title {
  font-size: 1.25rem;
  font-weight: 700;
  color: var(--fg-color);
  text-decoration: none;
}

.nav-links {
  display: flex;
  gap: 1.25rem;
}

.nav-links a {
  color: var(--fg-color);
  text-decoration: none;
  font-size: 0.9rem;
}

.nav-links a:hover {
  color: var(--highlight-color);
}

main {
  min-height: 60vh;
  padding-bottom: 2rem;
}

h1, h2, h3, h4 {
  margin-top: 1.5em;
  margin-bottom: 0.5em;
  line-height: 1.3;
}

h1 { font-size: 2rem; }
h2 { font-size: 1.5rem; }
h3 { font-size: 1.2rem; }

p {
  margin-bottom: 1em;
}

article {
  padding-bottom: 2rem;
}

.post-meta {
  color: var(--neutral);
  font-size: 0.9rem;
  margin-bottom: 1.5rem;
}

.post-meta time {
  font-style: italic;
}

svg {
  max-width: 100%;
  height: auto;
  display: block;
  margin: 1.5rem auto;
  background: var(--bg-color);
}

.data-element {
  stroke: var(--data-element-stroke);
  stroke-width: var(--data-element-stroke-width);
}

.axis {
  stroke: var(--axis-stroke);
  stroke-width: var(--axis-stroke-width);
}

.label {
  fill: var(--label-fill);
  font-size: var(--label-font-size);
  font-family: var(--label-font-family);
  font-weight: 400;
}

.chart-error {
  border: 2px solid #d00;
  padding: 10px;
  margin: 10px 0;
  background: #fee;
}

pre.code {
  background: var(--neutral-background-color);
  border: 1px solid rgba(0,0,0,0.1);
  border-radius: 4px;
  padding: 1rem;
  overflow-x: auto;
  font-size: 0.85rem;
  margin: 1rem 0;
}

code {
  font-family: monospace;
  font-size: 0.85em;
  background: var(--neutral-background-color);
  padding: 0.15em 0.3em;
  border-radius: 3px;
}

pre.code code {
  background: none;
  padding: 0;
}

.keyword { color: #7928a1; font-weight: 600; }
.string  { color: #067d17; }
.comment { color: #888; font-style: italic; }
.literal { color: #0055aa; }

ul, ol {
  margin: 0.5em 0 1em 1.5em;
}

li {
  margin-bottom: 0.3em;
}

.post-list {
  list-style: none;
  margin-left: 0;
  padding: 0;
}

.post-list li {
  border-bottom: 1px solid #eee;
  padding: 1rem 0;
}

.post-list li:last-child {
  border-bottom: none;
}

.post-list h3 {
  margin-top: 0;
  margin-bottom: 0.25em;
}

.post-list p {
  color: #555;
  font-size: 0.9rem;
  margin-bottom: 0.25em;
}

.post-list small {
  color: #999;
  font-size: 0.8rem;
}

.tags-list {
  list-style: none;
  margin-left: 0;
  padding: 0;
  display: flex;
  flex-wrap: wrap;
  gap: 0.5rem;
}

.tags-list li a {
  display: inline-block;
  background: var(--neutral-color);
  padding: 0.3rem 0.75rem;
  border-radius: 3px;
  text-decoration: none;
  color: var(--highlight-color);
  font-size: 0.9rem;
}

.tags-list li a:hover {
  background: #ddd;
}

.pagination {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 1.5rem;
  margin: 2rem 0;
  padding-top: 1rem;
  border-top: 1px solid #eee;
}

.pagination span {
  color: #999;
  font-size: 0.9rem;
}

.site-description {
  color: #666;
  font-size: 1rem;
  margin-bottom: 2rem;
}

#search-input,
#tag-search {
  width: 100%;
  padding: 0.75rem;
  font-size: 1rem;
  border: 1px solid #ccc;
  border-radius: 4px;
  margin-bottom: 1rem;
}

#search-input:focus,
#tag-search:focus {
  outline: none;
  border-color: #0055aa;
  box-shadow: 0 0 0 2px rgba(0, 85, 170, 0.15);
}

.search-results {
  list-style: none;
  margin-left: 0;
  padding: 0;
}

.search-results li {
  border-bottom: 1px solid #eee;
  padding: 0.75rem 0;
}

table {
  border-collapse: collapse;
  width: 100%;
  margin: 1rem 0;
}

th, td {
  border: 1px solid #ddd;
  padding: 0.5rem 0.75rem;
  text-align: left;
}

th {
  background: var(--bg-color);
  font-weight: 600;
}

blockquote {
  border-left: 3px solid #ccc;
  margin: 1rem 0;
  padding: 0.5rem 1rem;
  color: #555;
}

abbr {
  text-decoration: underline dotted;
  cursor: help;
}

figure.chart-figure {
  margin: 1.5rem 0;
}

.chart-figcaption {
  padding: 0.75rem;
  border-top: none;
  font-size: 0.85rem;
  text-align: center;
}

.chart-figcaption table {
  margin: 0;
  font-size: 0.9rem;
}

.chart-figcaption td:first-child {
  width: 30%;
}

footer {
  border-top: 1px solid #ddd;
  padding: 1rem 0;
  margin-top: 2rem;
  color: var(--fg-color);
  font-size: 0.85rem;
  text-align: center;
}

@view-transition {
  navigation: auto;
}

::view-transition-old(root),
::view-transition-new(root) {
  animation-duration: 0.3s;
}

::view-transition-old(root) {
  animation-name: fade-out;
}

::view-transition-new(root) {
  animation-name: fade-in;
}

@keyframes fade-out {
  to {
    opacity: 0;
  }
}

@keyframes fade-in {
  from {
    opacity: 0;
  }
}

</style>
<script>
// Chart interactivity is now handled natively by SVG using :target selectors
// No external JavaScript needed for chart interactions

</script>
</head>
<body>
  <header>
  <nav>
    <a href="index.html" class="site-title">QJS-MD Test Notebook</a>
    <div class="nav-links">
      <a href="index.html">Posts</a>
      <a href="tags.html">Tags</a>
      <a href="search.html">Search</a>
    </div>
  </nav>
</header>

  <main>
    <h2>All Tags</h2>
<input type="text" id="tag-search" placeholder="Search tags..." />
<ul id="tags-list" class="tags-list">
  <li><a href="tag-bar.html">bar</a> (1)</li>
  <li><a href="tag-charts.html">charts</a> (1)</li>
  <li><a href="tag-csv.html">csv</a> (1)</li>
  <li><a href="tag-debug.html">debug</a> (7)</li>
  <li><a href="tag-donut.html">donut</a> (1)</li>
  <li><a href="tag-guide.html">guide</a> (1)</li>
  <li><a href="tag-heikin-ashi.html">heikin-ashi</a> (1)</li>
  <li><a href="tag-line.html">line</a> (1)</li>
  <li><a href="tag-map.html">map</a> (2)</li>
  <li><a href="tag-obsidian.html">obsidian</a> (1)</li>
  <li><a href="tag-scatter.html">scatter</a> (1)</li>
  <li><a href="tag-svg.html">svg</a> (7)</li>
  <li><a href="tag-test.html">test</a> (2)</li>
  <li><a href="tag-tutorial.html">tutorial</a> (1)</li>
  <li><a href="tag-yaml.html">yaml</a> (1)</li>
</ul>
<script>
document.getElementById('tag-search').addEventListener('input', function(e) {
  const search = e.target.value.toLowerCase();
  const items = document.querySelectorAll('#tags-list li');
  items.forEach(item => {
    const text = item.textContent.toLowerCase();
    item.style.display = text.includes(search) ? '' : 'none';
  });
});
</script>

  </main>
  <footer>
  <p>&copy; 2026 QJS-MD Test Notebook</p>
</footer>

</body>
</html>
